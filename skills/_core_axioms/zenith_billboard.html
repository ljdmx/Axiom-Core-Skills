<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Core | Zenith Billboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="axiom_data.js"></script>
    <style>
        :root {
            /* OKLCH Color Palette - Zenith White */
            --bg-color: oklch(0.99 0.005 200);
            --surface-color: oklch(1 0 0 / 0.6);
            --text-primary: oklch(0.2 0.01 200);
            --text-secondary: oklch(0.4 0.02 200);
            --accent-primary: oklch(0.55 0.12 200);
            --border-color: oklch(0.9 0.01 200 / 0.4);
            --glass-blur: blur(60px);
            --transition-smooth: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 10%, oklch(0.95 0.02 220 / 0.4) 0px, transparent 40%),
                radial-gradient(at 90% 90%, oklch(0.95 0.02 180 / 0.4) 0px, transparent 40%),
                url("./assets/zenith_white_abstract.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 5%;
            overflow-x: hidden;
        }

        /* Material Realism Noise */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 1000;
        }

        .billboard-container {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: minmax(180px, auto);
            gap: 1.5rem;
        }

        .bento-card {
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px -10px oklch(0 0 0 / 0.05);
        }

        .bento-card:hover {
            transform: scale(1.02) translateY(-8px);
            border-color: var(--accent-primary);
            box-shadow: 0 30px 60px -15px oklch(0 0 0 / 0.1);
            z-index: 10;
        }

        /* Asymmetric Layout */
        .hero-card { grid-column: span 8; grid-row: span 2; justify-content: flex-start; }
        .stat-card { grid-column: span 4; grid-row: span 1; }
        .vision-card { grid-column: span 4; grid-row: span 2; }
        .tech-card { grid-column: span 4; grid-row: span 1; }
        .metrics-card { grid-column: span 4; grid-row: span 1; }

        .bento-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .bento-card .content {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: var(--text-primary);
        }

        .hero-card .content {
            font-size: 4.5rem;
            margin-top: auto;
            color: var(--accent-primary);
        }

        .bento-card p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-top: 1rem;
            max-width: 90%;
        }

        .icon-badge {
            position: absolute;
            top: 2rem;
            right: 2.5rem;
            font-size: 2.5rem;
            color: var(--accent-primary);
            opacity: 0.2;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        /* Decoration */
        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--accent-primary);
            filter: blur(80px);
            opacity: 0.1;
            top: -100px;
            right: -100px;
            pointer-events: none;
        }

        @media (max-width: 1200px) {
            .billboard-container { grid-template-columns: repeat(8, 1fr); }
            .hero-card { grid-column: span 8; }
            .vision-card { grid-column: span 4; }
        }

        @media (max-width: 768px) {
            .billboard-container { display: flex; flex-direction: column; }
            .bento-card { min-height: 300px; }
            .hero-card .content { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="billboard-container">
        <!-- Main Subject -->
        <div class="bento-card hero-card">
            <div class="glow"></div>
            <i class="ph ph-shield-star icon-badge"></i>
            <h2>Visual Sovereignty</h2>
            <div class="content" id="projectName">...</div>
            <p>Elevating digital architecture through high-fidelity aesthetics and autonomous soul alignment.</p>
        </div>

        <!-- RAM Score -->
        <div class="bento-card stat-card">
            <h2>RAM Performance</h2>
            <div class="stat-value" id="ramOverall">...</div>
            <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; color: var(--accent-primary);">
                <i class="ph ph-trend-up"></i>
                <span>ZENITH STATUS</span>
            </div>
        </div>

        <!-- Vision -->
        <div class="bento-card vision-card">
            <i class="ph ph-lighthouse icon-badge"></i>
            <h2>Soul Vision</h2>
            <div class="content" style="font-size: 1.75rem;" id="visionText">...</div>
            <p id="visionSub">...</p>
        </div>

        <!-- Tech Stack -->
        <div class="bento-card tech-card">
            <h2>Tech Stack</h2>
            <div class="content" style="font-size: 1.5rem;" id="techStack">VITE + REACT</div>
            <p>OKLCH Color Model • Spring Kinetics</p>
        </div>

        <!-- Core Axioms -->
        <div class="bento-card metrics-card">
            <h2>Intelligence</h2>
            <div class="content" style="font-size: 1.5rem;">AGENTIC CORE</div>
            <p>v9.6 Platform Commander</p>
        </div>
    </div>

    <script>
        function hydrate() {
            const data = window.AXIOM_DATA;
            if (!data) return;

            const { nexus, soul } = data;

            document.getElementById('projectName').textContent = nexus.project_name.toUpperCase();
            document.getElementById('ramOverall').textContent = nexus.soul_scorecard.overall;
            document.getElementById('visionText').textContent = soul.vision;
            document.getElementById('visionSub').textContent = "Guided by " + soul.core_principles.length + " core principles of excellence.";
            document.getElementById('techStack').textContent = nexus.tech_stack.runtime.toUpperCase();
        }

        hydrate();

        // Refresh loop
        setInterval(() => {
            const script = document.createElement('script');
            script.src = 'axiom_data.js?t=' + Date.now();
            script.onload = () => {
                hydrate();
                script.remove();
            };
            document.head.appendChild(script);
        }, 3000);
    </script>
</body>
</html>
