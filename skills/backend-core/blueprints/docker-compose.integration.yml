version: '3.8'

# Docker Compose Integration Setup
# Usage: Use this to spin up isolated persistence layers for robust integration testing
# Commands: docker-compose -f docker-compose.integration.yml up -d

services:
  test-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: test_db
    ports:
      - "54320:5432" # Mapped to non-standard port to avoid host collision
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d test_db"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-redis:
    image: redis:7-alpine
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

# Note: Integration suite runners (e.g., Jest or Go tests) should be configured
# to target localhost:54320 and localhost:63790 respectively.
