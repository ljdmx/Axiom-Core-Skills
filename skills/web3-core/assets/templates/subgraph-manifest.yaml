specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CoreContract
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: CoreContract
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Transaction
        - User
      abis:
        - name: CoreContract
          file: ./abis/CoreContract.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mapping.ts
