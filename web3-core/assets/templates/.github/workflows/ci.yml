# .github/workflows/ci.yml
# Web3 Smart Contract CI Full Pipeline
# Copy this file to your project's .github/workflows/ directory
# Configure in GitHub Secrets: MAINNET_RPC_URL, SEPOLIA_RPC_URL, ETHERSCAN_API_KEY, DEPLOYER_PRIVATE_KEY

name: Smart Contract CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  MAINNET_RPC_URL:   ${{ secrets.MAINNET_RPC_URL }}
  SEPOLIA_RPC_URL:   ${{ secrets.SEPOLIA_RPC_URL }}
  ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

jobs:
  # ────────────────────────────────────────────────────────────
  # Foundry Tests (Fastest)
  # ────────────────────────────────────────────────────────────
  foundry-test:
    name: Foundry Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # Load forge dependencies (lib/)

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly        # Or fixed version like v0.2.0

      - name: Cache forge build
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            out/
            cache/
          key: foundry-${{ hashFiles('foundry.toml', 'src/**') }}

      - name: Compile
        run: forge build --sizes  # Check contract size < 24KB

      - name: Run unit tests + Gas report
        run: forge test --gas-report 2>&1 | tee gas-report.txt

      - name: Gas snapshot regression check
        run: forge snapshot --check  # Fails CI if Gas increases (requires forge snapshot baseline first)

      - name: Run Fuzz (CI profile, faster)
        run: forge test --profile ci  # foundry.toml [profile.ci] runs = 1000

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gas-report
          path: gas-report.txt

  # ────────────────────────────────────────────────────────────
  # Hardhat Tests + Coverage
  # ────────────────────────────────────────────────────────────
  hardhat-test:
    name: Hardhat Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Compile
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

      - name: Coverage report
        run: npx hardhat coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false   # Does not force failure if coverage misses targets

  # ────────────────────────────────────────────────────────────
  # Slither Static Security Analysis
  # ────────────────────────────────────────────────────────────
  slither:
    name: Slither Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Upload SARIF to GitHub Security dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          node-version: '20'
          slither-args: >
            --filter-paths "lib/,node_modules/"
            --exclude naming-convention,solc-version
          fail-on: high           # Fail immediately on High or above vulnerabilities

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}

      - name: Upload Slither report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-report
          path: ${{ steps.slither.outputs.sarif }}

  # ────────────────────────────────────────────────────────────
  # Automatically deploy to Sepolia testnet (main branch only, requires manual approval)
  # ────────────────────────────────────────────────────────────
  deploy-sepolia:
    name: Deploy to Sepolia
    needs: [foundry-test, hardhat-test, slither]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: sepolia          # Configure approvers in GitHub Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: nightly }

      - name: Deploy + Verify
        run: |
          forge script script/Deploy.s.sol \
            --rpc-url $SEPOLIA_RPC_URL \
            --broadcast \
            --verify \
            --etherscan-api-key $ETHERSCAN_API_KEY \
            -vvvv
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployments-sepolia
          path: deployments/
