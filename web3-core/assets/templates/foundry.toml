# foundry.toml —Foundry Production Configuration Template

[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
cache    = true
cache_path = "cache"

# ─── Compilation ──────────────────────────────────────────────────────
solc_version   = "0.8.24"
optimizer      = true
optimizer_runs = 200
via_ir         = true

# ─── Fuzz Testing ─────────────────────────────────────────────────
[fuzz]
runs              = 10000
seed              = "0x1"
max_test_rejects  = 65536
dictionary_weight = 40

# ─── Invariant Testing ────────────────────────────────────────────────
[invariant]
runs           = 512
depth          = 500          # Call depth per run
call_override  = false

# ─── CI Mode (Faster, fewer fuzz runs) ──────────────────────────────
[profile.ci]
fuzz     = { runs = 1000 }
invariant = { runs = 64 }

# ─── Mainnet Fork (For local testing) ──────────────────────────────────
# Pass via CLI: forge test --fork-url $MAINNET_RPC_URL
# Or uncomment:
# eth_rpc_url = "${MAINNET_RPC_URL}"
# fork_block_number = 19_000_000

# ─── Gas Report ──────────────────────────────────────────────────
[profile.default.optimizer_details]
yul            = true
yulDetails     = { stackAllocation = true }

# ─── Formatting ────────────────────────────────────────────────────
[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
int_types      = "long"

# ─── Documentation Generation ──────────────────────────────────────────────────
[doc]
out  = "references"
root = "."

# ─── Dependency Remappings ──────────────────────────────────────────────────
[remappings]
# Run forge remappings > remappings.txt to generate automatically
# Common manual configurations:
# "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
# "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
